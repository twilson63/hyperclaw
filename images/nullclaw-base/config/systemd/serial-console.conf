[Service]
# Autologin for NullClaw serial console
# Allows automatic login as nullclaw user on ttyS0

ExecStart=
ExecStart=-/sbin/agetty --autologin nullclaw --keep-baud 115200,38400,9600 ttyS0 $TERM

# Increase timeout for slow boot
TimeoutStartSec=30

# Don't restart on failure (wait for user input)
Restart=no

# Idle type for better serial console handling
Type=idle