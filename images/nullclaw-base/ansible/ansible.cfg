# Ansible Configuration for NullClaw Base Image

[defaults]
inventory = ./inventory.yml
roles_path = ./roles
host_key_checking = False
pipelining = True
timeout = 60
gathering = smart
fact_caching = memory
fact_caching_timeout = 86400
retry_files_enabled = False

[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False

[connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=60s
pipelining = True